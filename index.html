<!DOCTYPE html>
<html>
<head>
<title>Professional Multi-Page Quiz</title>
<style>

body {
font-family: Arial;
margin:0;
background:#f2f2f2;
}

.container {
display:flex;
height:100vh;
}

.question-area {
flex:3;
padding:20px;
overflow-y:auto;
background:white;
margin-right:260px;
}

.option {
margin:8px 0;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
cursor:pointer;
}

.option.correct { background:#c8f7c5; }
.option.wrong { background:#f7c5c5; }

button {
margin:5px;
padding:8px 15px;
cursor:pointer;
}

.restart-btn {
background:#ff9800;
color:white;
border:none;
}

.nav-area {
flex:1;
background:#222;
color:white;
padding:15px;
position:fixed;
right:0;
top:0;
height:100%;
overflow-y:auto;
width:260px;
}

.summary {
margin-bottom:15px;
}

.nav-grid {
display:flex;
flex-wrap:wrap;
gap:5px;
}

.nav-btn {
width:35px;
height:35px;
border:none;
cursor:pointer;
background:#555;
color:white;
}

.nav-btn.current { background:#1e90ff; }
.nav-btn.answered { background:#28a745; }
.nav-btn.notanswered { background:#dc3545; }

select {
padding:6px;
margin:5px 0;
}

</style>
</head>
<body>

<div class="container">

<div class="question-area">

<h2>CLASSICAL DANCE MCQ Quiz</h2>

<label><b>Select Page:</b></label><br>
<select id="pageSelect"></select>

<label><b>Select Mode:</b></label><br>
<select id="modeSelect">
<option value="false">Non Shuffle</option>
<option value="true">Shuffle</option>
</select>

<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="showResult()">Submit</button>
<button class="restart-btn" onclick="restartPage()">Restart Page</button>

<div id="explanation"></div>
<div id="result"></div>

</div>

<div class="nav-area">

<h3>Question Palette</h3>

<div class="summary">
Answered: <span id="answeredCount">0</span><br>
Not Answered: <span id="notAnsweredCount">0</span><br>
Not Visited: <span id="notVisitedCount">0</span>
</div>

<div class="nav-grid" id="navPanel"></div>

</div>

</div>

<script>

// =============================
// ADD PAGES HERE (Only once per page)
// =============================

const allPages = {

"Page 1": [
{
question: "Raja Ram Mohan Roy was born in which year? / ராஜா ராம் மோகன் ராய் எந்த ஆண்டு பிறந்தார்?",
options: ["1765","1772","1780","1795"],
correctAnswer: "1772",
explanation: "Raja Ram Mohan Roy was born in 1772 at Radhanagar in Bengal. / ராஜா ராம் மோகன் ராய் 1772 ஆம் ஆண்டு பெங்காலில் உள்ள ராதாநகரில் பிறந்தார்."
},

{
question: "Raja Ram Mohan Roy was born at Radhanagar in which region? / ராஜா ராம் மோகன் ராய் ராதாநகர் எந்த பகுதியில் உள்ளது?",
options: ["Punjab / பஞ்சாப்","Bengal / பெங்கால்","Bihar / பீகார்","Odisha / ஒடிசா"],
correctAnswer: "Bengal / பெங்கால்",
explanation: "He was born in Radhanagar, a small village in Bengal. / அவர் பெங்காலில் உள்ள ராதாநகரில் பிறந்தார்."
},

{
question: "Raja Ram Mohan Roy studied Sanskrit literature and Hindu philosophy in which city? / அவர் சமஸ்கிருத இலக்கியம் மற்றும் இந்து தத்துவத்தை எந்த நகரத்தில் பயின்றார்?",
options: ["Patna / பட்னா","Kolkata / கொல்கத்தா","Varanasi / வாராணசி","Delhi / டெல்லி"],
correctAnswer: "Varanasi / வாராணசி",
explanation: "He studied Sanskrit literature and Hindu philosophy in Varanasi. / அவர் வாராணசியில் சமஸ்கிருத இலக்கியம் மற்றும் இந்து தத்துவம் பயின்றார்."
},

{
question: "Raja Ram Mohan Roy studied Persian, Arabic and the Quran in which place? / அவர் பாரசீகம், அரபி மற்றும் குர்ஆன் எங்கு பயின்றார்?",
options: ["Patna / பட்னா","Varanasi / வாராணசி","Madras / சென்னை","Lucknow / லக்னோ"],
correctAnswer: "Patna / பட்னா",
explanation: "He studied Persian, Arabic and the Quran in Patna. / அவர் பட்னாவில் பாரசீகம், அரபி மற்றும் குர்ஆன் பயின்றார்."
},

{
question: "Which of the following languages was mastered by Raja Ram Mohan Roy? / கீழ்கண்ட எந்த மொழிகளை ராஜா ராம் மோகன் ராய் கற்றிருந்தார்?",
options: [
"English, Latin, Greek / ஆங்கிலம், லத்தீன், கிரேக்கம்",
"Only English / ஆங்கிலம் மட்டும்",
"Only Sanskrit / சமஸ்கிருதம் மட்டும்",
"Only Persian / பாரசீகம் மட்டும்"
],
correctAnswer: "English, Latin, Greek / ஆங்கிலம், லத்தீன், கிரேக்கம்",
explanation: "He mastered multiple languages including English, Latin, Greek and Hebrew. / அவர் ஆங்கிலம், லத்தீன், கிரேக்கம் மற்றும் எபிரேய மொழிகளில் தேர்ச்சி பெற்றிருந்தார்."
},

{
question: "Raja Ram Mohan Roy was known as a brilliant _____. / ராஜா ராம் மோகன் ராய் ஒரு சிறந்த ______ ஆக அறியப்பட்டார்.",
options: ["Warrior / போர்வீரர்","Scholar / அறிஞர்","King / மன்னர்","Poet / கவிஞர்"],
correctAnswer: "Scholar / அறிஞர்",
explanation: "He was known as a brilliant scholar who mastered many languages. / பல மொழிகளில் தேர்ச்சி பெற்ற சிறந்த அறிஞராக அவர் அறியப்பட்டார்."
}
],

"Page 2": [
{
question: "Sattriya classical dance belongs to which state?",
options: ["Assam","Kerala","Tamil Nadu","Odisha"],
correctAnswer: "Assam",
explanation: "Sattriya belongs to Assam."
}
],

"Page 3": [
{
question: "Mohiniyattam belongs to which state?",
options: ["Kerala","Odisha","Assam","Tamil Nadu"],
correctAnswer: "Kerala",
explanation: "Mohiniyattam belongs to Kerala."
}
],

"Page 4": [
{
question: "Bharatanatyam originated in?",
options: ["Tamil Nadu","Kerala","UP","Manipur"],
correctAnswer: "Tamil Nadu",
explanation: "Bharatanatyam originated in Tamil Nadu."
}
],

"Page 5": [
{
question: "Kathak belongs to which state?",
options: ["Uttar Pradesh","Kerala","Assam","Odisha"],
correctAnswer: "Uttar Pradesh",
explanation: "Kathak belongs to Uttar Pradesh."
}
],

"Page 6": [
{
question: "Kathak belongs to which state?",
options: ["Uttar Pradesh","Kerala","Assam","Odisha"],
correctAnswer: "Uttar Pradesh",
explanation: "Kathak belongs to Uttar Pradesh."
},
{
question: "raja belongs to which state?",
options: ["Uttar Pradesh","Kerala","Assam","Odisha"],
correctAnswer: "Uttar Pradesh",
explanation: "Kathak belongs to Uttar Pradesh."
}
]

};

// =============================

let quizData = [];
let current = 0;
let answers = [];
let visited = [];
let currentPage = "";
let shuffleMode = false;

// =============================

function shuffleArray(array){
for(let i = array.length - 1; i > 0; i--){
let j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
return array;
}

// =============================

function loadPage(pageName){

currentPage = pageName;

quizData = JSON.parse(JSON.stringify(allPages[pageName]));

if(shuffleMode){
shuffleArray(quizData);
quizData.forEach(q => shuffleArray(q.options));
}

current = 0;
answers = new Array(quizData.length).fill(null);
visited = new Array(quizData.length).fill(false);

document.getElementById("result").innerHTML = "";

loadQuestion();
}

// =============================

function restartPage(){
loadPage(currentPage);
}

// =============================

function loadQuestion(){

visited[current] = true;

let q = quizData[current];

document.getElementById("progress").innerText =
"Question " + (current+1) + " of " + quizData.length;

document.getElementById("question").innerText = q.question;

let html = "";

for(let i=0;i<q.options.length;i++){

let className = "option";

if(answers[current] !== null){
if(q.options[i] === q.correctAnswer)
className += " correct";
else if(i === answers[current])
className += " wrong";
}

html += '<div class="'+className+'" onclick="selectAnswer('+i+')">'+q.options[i]+'</div>';
}

document.getElementById("options").innerHTML = html;

if(answers[current] !== null){
document.getElementById("explanation").innerHTML =
"<b>Explanation:</b> " + q.explanation;
}else{
document.getElementById("explanation").innerHTML = "";
}

loadNavigation();
updateSummary();
}

// =============================

function selectAnswer(index){
answers[current] = index;
loadQuestion();
}

function nextQuestion(){
if(current < quizData.length-1){
current++;
loadQuestion();
}
}

function prevQuestion(){
if(current > 0){
current--;
loadQuestion();
}
}

function goToQuestion(i){
current = i;
loadQuestion();
}

// =============================

function loadNavigation(){

let navHTML = "";

for(let i=0;i<quizData.length;i++){

let className = "nav-btn";

if(i === current) className += " current";
else if(answers[i] !== null) className += " answered";
else if(visited[i]) className += " notanswered";

navHTML += '<button class="'+className+'" onclick="goToQuestion('+i+')">'+(i+1)+'</button>';
}

document.getElementById("navPanel").innerHTML = navHTML;
}

// =============================

function updateSummary(){

let answered = answers.filter(a=>a!==null).length;
let notVisited = visited.filter(v=>v===false).length;
let notAnswered = quizData.length - answered - notVisited;

document.getElementById("answeredCount").innerText = answered;
document.getElementById("notAnsweredCount").innerText = notAnswered;
document.getElementById("notVisitedCount").innerText = notVisited;
}

// =============================

function showResult(){

let score = 0;

for(let i=0;i<quizData.length;i++){
if(quizData[i].options[answers[i]] === quizData[i].correctAnswer){
score++;
}
}

document.getElementById("result").innerHTML =
"<h3>Your Score: "+score+" / "+quizData.length+"</h3>";
}

// =============================

window.onload = function(){

let pageSelect = document.getElementById("pageSelect");

for(let page in allPages){
let option = document.createElement("option");
option.value = page;
option.text = page;
pageSelect.appendChild(option);
}

pageSelect.onchange = function(){
loadPage(this.value);
};

document.getElementById("modeSelect").onchange = function(){
shuffleMode = (this.value === "true");
loadPage(pageSelect.value);
};

loadPage(Object.keys(allPages)[0]);
};

</script>

</body>
</html>
