<!DOCTYPE html>
<html>
<head>
<title>Professional Multi-Page Quiz</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
display:flex;
height:100vh;
}

.question-area{
flex:3;
padding:20px;
overflow-y:auto;
background:white;
margin-right:260px;
}

.option{
margin:8px 0;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
cursor:pointer;
}

.option.correct{background:#c8f7c5;}
.option.wrong{background:#f7c5c5;}

button{
margin:5px;
padding:8px 15px;
cursor:pointer;
}

.restart-btn{
background:#ff9800;
color:white;
border:none;
}

.nav-area{
flex:1;
background:#222;
color:white;
padding:15px;
position:fixed;
right:0;
top:0;
height:100%;
overflow-y:auto;
width:260px;
}

.summary{
margin-bottom:15px;
}

.nav-grid{
display:flex;
flex-wrap:wrap;
gap:5px;
}

.nav-btn{
width:35px;
height:35px;
border:none;
cursor:pointer;
background:#555;
color:white;
}

.nav-btn.current{background:#1e90ff;}
.nav-btn.correct{background:#28a745;}
.nav-btn.wrong{background:#dc3545;}
.nav-btn.notanswered{background:#ff9800;}

select{
padding:6px;
margin:5px 0;
}

</style>
</head>

<body>

<div class="container">

<div class="question-area">

<h2>CLASSICAL DANCE MCQ Quiz</h2>

<label><b>Select Page:</b></label><br>
<select id="pageSelect"></select>

<label><b>Select Mode:</b></label><br>
<select id="modeSelect">
<option value="false">Non Shuffle</option>
<option value="true">Shuffle</option>
</select>

<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="showResult()">Submit</button>
<button class="restart-btn" onclick="restartPage()">Restart Page</button>

<div id="explanation"></div>
<div id="result"></div>

</div>

<div class="nav-area">

<h3>Question Palette</h3>

<div class="summary">
Answered: <span id="answeredCount">0</span><br>
Not Answered: <span id="notAnsweredCount">0</span><br>
Not Visited: <span id="notVisitedCount">0</span>
</div>

<div class="nav-grid" id="navPanel"></div>

</div>

</div>

<script>

// =============================
// ALL QUIZ PAGES
// =============================

const allPages = {

"Page 1":[

{
question:"Who is known as the Father of the Indian Renaissance?",
options:["Swami Vivekananda","Raja Ram Mohan Roy","Dayananda Saraswati","Ishwar Chandra Vidyasagar"],
correctAnswer:"Raja Ram Mohan Roy",
explanation:"Raja Ram Mohan Roy is called the Father of the Indian Renaissance."
},

{
question:"In which year was Raja Ram Mohan Roy born?",
options:["1765","1772","1780","1795"],
correctAnswer:"1772",
explanation:"He was born in 1772."
},

{
question:"Raja Ram Mohan Roy was born in which village?",
options:["Nadia","Radhanagar","Murshidabad","Patna"],
correctAnswer:"Radhanagar",
explanation:"His birthplace was Radhanagar village."
},

{
question:"Radhanagar is located in which region?",
options:["Punjab","Bengal","Maharashtra","Bihar"],
correctAnswer:"Bengal",
explanation:"He was born in Bengal."
},

{
question:"Raja Ram Mohan Roy studied Sanskrit literature in which city?",
options:["Kolkata","Patna","Varanasi","Delhi"],
correctAnswer:"Varanasi",
explanation:"He studied Sanskrit and Hindu philosophy in Varanasi."
},

{
question:"He studied Persian and Arabic in which city?",
options:["Varanasi","Patna","Calcutta","Agra"],
correctAnswer:"Patna",
explanation:"He studied Persian and Arabic in Patna."
},

{
question:"Raja Ram Mohan Roy opposed which inhuman practice?",
options:["Child marriage","Sati","Untouchability","Polygamy"],
correctAnswer:"Sati",
explanation:"He led a powerful movement against sati."
},

{
question:"Which Governor-General helped abolish Sati in 1829?",
options:["Lord Dalhousie","Lord Canning","William Bentinck","Lord Curzon"],
correctAnswer:"William Bentinck",
explanation:"William Bentinck passed the regulation banning sati."
},

{
question:"In which year was Sati officially abolished?",
options:["1815","1828","1829","1835"],
correctAnswer:"1829",
explanation:"The law abolishing sati was enacted in 1829."
},

{
question:"Raja Ram Mohan Roy supported which type of education?",
options:["Traditional only","Western modern education","Military education","Religious-only education"],
correctAnswer:"Western modern education",
explanation:"He supported modern western education."
}

],

"Page 2":[
{
question:"Sattriya classical dance belongs to which state?",
options:["Assam","Kerala","Tamil Nadu","Odisha"],
correctAnswer:"Assam",
explanation:"Sattriya belongs to Assam."
}
],

"Page 3":[
{
question:"Mohiniyattam belongs to which state?",
options:["Kerala","Odisha","Assam","Tamil Nadu"],
correctAnswer:"Kerala",
explanation:"Mohiniyattam belongs to Kerala."
}
],

"Page 4":[
{
question:"Bharatanatyam originated in?",
options:["Tamil Nadu","Kerala","UP","Manipur"],
correctAnswer:"Tamil Nadu",
explanation:"Bharatanatyam originated in Tamil Nadu."
}
],

"Page 5":[
{
question:"Kathak belongs to which state?",
options:["Uttar Pradesh","Kerala","Assam","Odisha"],
correctAnswer:"Uttar Pradesh",
explanation:"Kathak belongs to Uttar Pradesh."
}
],

"Page 6":[

{
question:"Kathak belongs to which state?",
options:["Uttar Pradesh","Kerala","Assam","Odisha"],
correctAnswer:"Uttar Pradesh",
explanation:"Kathak belongs to Uttar Pradesh."
},

{
question:"Raja belongs to which state?",
options:["Uttar Pradesh","Kerala","Assam","Odisha"],
correctAnswer:"Uttar Pradesh",
explanation:"Example question."
}

]

};

// =============================

let quizData=[]
let current=0
let answers=[]
let visited=[]
let currentPage=""
let shuffleMode=false
let submitted=false

function shuffleArray(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
return array
}

function loadPage(pageName){

submitted=false
currentPage=pageName
quizData=JSON.parse(JSON.stringify(allPages[pageName]))

if(shuffleMode){
shuffleArray(quizData)
quizData.forEach(q=>shuffleArray(q.options))
}

current=0
answers=new Array(quizData.length).fill(null)
visited=new Array(quizData.length).fill(false)

document.getElementById("result").innerHTML=""

loadQuestion()
}

function restartPage(){
loadPage(currentPage)
}

function loadQuestion(){

visited[current]=true
let q=quizData[current]

document.getElementById("progress").innerText=
"Question "+(current+1)+" of "+quizData.length

document.getElementById("question").innerHTML=
"<b>Q"+(current+1)+":</b> "+q.question

let html=""

for(let i=0;i<q.options.length;i++){

let className="option"

if(answers[current]!==null){

if(q.options[i]===q.correctAnswer)
className+=" correct"

else if(i===answers[current])
className+=" wrong"

}

html+='<div class="'+className+'" onclick="selectAnswer('+i+')">'+q.options[i]+'</div>'
}

document.getElementById("options").innerHTML=html

if(answers[current]!==null){
document.getElementById("explanation").innerHTML=
"<b>Explanation:</b> "+q.explanation
}else{
document.getElementById("explanation").innerHTML=""
}

loadNavigation()
updateSummary()
}

function selectAnswer(index){

if(submitted) return

answers[current]=index
loadQuestion()

}

function nextQuestion(){
if(current<quizData.length-1){
current++
loadQuestion()
}
}

function prevQuestion(){
if(current>0){
current--
loadQuestion()
}
}

function goToQuestion(i){
current=i
loadQuestion()
}

function loadNavigation(){

let navHTML=""

for(let i=0;i<quizData.length;i++){

let className="nav-btn"

if(i===current) className+=" current"

else if(submitted && answers[i]!==null){

if(quizData[i].options[answers[i]]===quizData[i].correctAnswer)
className+=" correct"
else
className+=" wrong"

}

else if(answers[i]!==null) className+=" answered"

else if(visited[i]) className+=" notanswered"

navHTML+='<button class="'+className+'" onclick="goToQuestion('+i+')">'+(i+1)+'</button>'

}

document.getElementById("navPanel").innerHTML=navHTML
}

function updateSummary(){

let answered=answers.filter(a=>a!==null).length
let notVisited=visited.filter(v=>v===false).length
let notAnswered=quizData.length-answered-notVisited

document.getElementById("answeredCount").innerText=answered
document.getElementById("notAnsweredCount").innerText=notAnswered
document.getElementById("notVisitedCount").innerText=notVisited
}

function showResult(){

submitted=true

let score=0

for(let i=0;i<quizData.length;i++){

if(quizData[i].options[answers[i]]===quizData[i].correctAnswer){
score++
}

}

document.getElementById("result").innerHTML=
"<h3>Your Score: "+score+" / "+quizData.length+"</h3>"

loadNavigation()

}

window.onload=function(){

let pageSelect=document.getElementById("pageSelect")

for(let page in allPages){
let option=document.createElement("option")
option.value=page
option.text=page
pageSelect.appendChild(option)
}

pageSelect.onchange=function(){
loadPage(this.value)
}

document.getElementById("modeSelect").onchange=function(){
shuffleMode=(this.value==="true")
loadPage(pageSelect.value)
}

loadPage(Object.keys(allPages)[0])

}

</script>

</body>
</html>
