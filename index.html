<!DOCTYPE html>

<html>
<head>
<title>Professional Quiz</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
display:flex;
height:100vh;
}

.question-area{
flex:3;
padding:20px;
background:white;
margin-right:260px;
overflow-y:auto;
}

.nav-area{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:#222;
color:white;
padding:15px;
overflow-y:auto;
}

.option{
padding:10px;
border:1px solid #ccc;
margin:8px 0;
border-radius:5px;
cursor:pointer;
}

.option.correct{background:#c8f7c5;}
.option.wrong{background:#f7c5c5;}

.nav-grid{
display:flex;
flex-wrap:wrap;
gap:5px;
}

.nav-btn{
width:35px;
height:35px;
border:none;
background:#555;
color:white;
cursor:pointer;
}

.nav-btn.current{background:#1e90ff;}
.nav-btn.correct{background:#28a745;}
.nav-btn.wrong{background:#dc3545;}
.nav-btn.review{background:#ffc107;}
.nav-btn.notanswered{background:#ff9800;}

button{
margin:5px;
padding:8px 14px;
cursor:pointer;
}

.timer{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#d9534f;
}

</style>

</head>

<body>

<div class="container">

<div class="question-area">

<h2>MCQ Quiz</h2>

<div class="timer" id="timer"></div>

<label>Select Page</label><br> <select id="pageSelect"></select>

<label>Select Mode</label><br> <select id="modeSelect">

<option value="false">Non Shuffle</option>
<option value="true">Shuffle</option>
</select>

<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>

<button onclick="prevQuestion()">Previous</button> <button onclick="nextQuestion()">Next</button> <button onclick="markReview()">Mark Review</button> <button onclick="showResult()">Submit</button> <button onclick="restartPage()">Restart</button>

<div id="explanation"></div>
<div id="result"></div>

</div>

<div class="nav-area">

<h3>Question Palette</h3>

<div id="summary"></div>

<div class="nav-grid" id="navPanel"></div>

</div>

</div>

<script>

const allPages = {

"Page 1":[
{
question:"Who is known as the Father of the Indian Renaissance?",
options:["Swami Vivekananda","Raja Ram Mohan Roy","Dayananda Saraswati","Ishwar Chandra Vidyasagar"],
correctAnswer:"Raja Ram Mohan Roy",
explanation:"Raja Ram Mohan Roy led major social reforms."
},

{
question:"In which year was Raja Ram Mohan Roy born?",
options:["1765","1772","1780","1795"],
correctAnswer:"1772",
explanation:"He was born in 1772."
},

{
question:"Raja Ram Mohan Roy opposed which practice?",
options:["Child marriage","Sati","Untouchability","Polygamy"],
correctAnswer:"Sati",
explanation:"He fought against the Sati system."
}
],

"Page 2":[
{
question:"Bharatanatyam originated in which state?",
options:["Tamil Nadu","Kerala","UP","Manipur"],
correctAnswer:"Tamil Nadu",
explanation:"Bharatanatyam originated in Tamil Nadu."
}
]

}

let quizData=[]
let answers=[]
let visited=[]
let review=[]
let current=0
let shuffleMode=false
let currentPage=""
let submitted=false

let time=300

let timerInterval=setInterval(function(){

let min=Math.floor(time/60)
let sec=time%60

document.getElementById("timer").innerText="Time Left: "+min+":"+sec

time--

if(time<0){
showResult()
}

},1000)

// shuffle
function shuffleArray(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[arr[i],arr[j]]=[arr[j],arr[i]]
}
}

// load page
function loadPage(page){

submitted=false
currentPage=page

quizData=JSON.parse(JSON.stringify(allPages[page]))

if(shuffleMode){
shuffleArray(quizData)
quizData.forEach(q=>shuffleArray(q.options))
}

answers=new Array(quizData.length).fill(null)
visited=new Array(quizData.length).fill(false)
review=new Array(quizData.length).fill(false)

current=0

loadQuestion()

}

// load question
function loadQuestion(){

visited[current]=true

let q=quizData[current]

document.getElementById("progress").innerText=
"Question "+(current+1)+" of "+quizData.length

document.getElementById("question").innerHTML=
"<b>Q"+(current+1)+":</b> "+q.question

let html=""

q.options.forEach((opt,i)=>{

let cls="option"

if(answers[current]!==null){

if(opt===q.correctAnswer) cls+=" correct"
else if(i===answers[current]) cls+=" wrong"

}

html+=`<div class="${cls}" onclick="selectAnswer(${i})">${opt}</div>`

})

document.getElementById("options").innerHTML=html

loadNavigation()
updateSummary()

}

// select answer
function selectAnswer(i){

if(submitted) return

answers[current]=i

loadQuestion()

}

// mark review
function markReview(){

review[current]=!review[current]

loadNavigation()

}

// navigation
function loadNavigation(){

let html=""

for(let i=0;i<quizData.length;i++){

let cls="nav-btn"

if(i===current) cls+=" current"

else if(review[i]) cls+=" review"

else if(submitted && answers[i]!==null){

if(quizData[i].options[answers[i]]===quizData[i].correctAnswer)
cls+=" correct"
else
cls+=" wrong"

}

else if(visited[i] && answers[i]===null)
cls+=" notanswered"

html+=`<button class="${cls}" onclick="goToQuestion(${i})">${i+1}</button>`

}

document.getElementById("navPanel").innerHTML=html

}

// go to
function goToQuestion(i){
current=i
loadQuestion()
}

// next
function nextQuestion(){
if(current<quizData.length-1){
current++
loadQuestion()
}
}

// prev
function prevQuestion(){
if(current>0){
current--
loadQuestion()
}
}

// summary
function updateSummary(){

let answered=answers.filter(a=>a!==null).length
let notVisited=visited.filter(v=>!v).length

document.getElementById("summary").innerHTML=
"Answered: "+answered+"<br>Not Visited: "+notVisited

}

// result
function showResult(){

submitted=true

let score=0

for(let i=0;i<quizData.length;i++){

if(quizData[i].options[answers[i]]===quizData[i].correctAnswer)
score++

}

let percent=((score/quizData.length)*100).toFixed(2)

document.getElementById("result").innerHTML=
"<h3>Score: "+score+"/"+quizData.length+"</h3>"+
"<h3>Percentage: "+percent+"%</h3>"

loadNavigation()

}

// restart
function restartPage(){

time=300

loadPage(currentPage)

}

// init
window.onload=function(){

let pageSelect=document.getElementById("pageSelect")

for(let page in allPages){

let opt=document.createElement("option")

opt.value=page
opt.text=page

pageSelect.appendChild(opt)

}

pageSelect.onchange=function(){
loadPage(this.value)
}

document.getElementById("modeSelect").onchange=function(){
shuffleMode=(this.value==="true")
loadPage(pageSelect.value)
}

loadPage(Object.keys(allPages)[0])

}

</script>

</body>
</html>
