<!DOCTYPE html>

<html>
<head>
<title>Professional Quiz System</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
display:flex;
height:100vh;
}

.question-area{
flex:3;
padding:20px;
background:white;
margin-right:260px;
overflow-y:auto;
}

.nav-area{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:#222;
color:white;
padding:15px;
overflow-y:auto;
}

.option{
padding:10px;
border:1px solid #ccc;
margin:8px 0;
border-radius:5px;
cursor:pointer;
}

.option.correct{background:#c8f7c5;}
.option.wrong{background:#f7c5c5;}

.nav-grid{
display:flex;
flex-wrap:wrap;
gap:5px;
}

.nav-btn{
width:35px;
height:35px;
border:none;
background:#555;
color:white;
cursor:pointer;
}

.nav-btn.current{background:#1e90ff;}
.nav-btn.correct{background:#28a745;}
.nav-btn.wrong{background:#dc3545;}
.nav-btn.review{background:#ffc107;}
.nav-btn.notanswered{background:#ff9800;}

button{
margin:5px;
padding:8px 14px;
cursor:pointer;
}

.timer{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
color:#d9534f;
}

</style>

</head>

<body>

<h2>MCQ Quiz</h2>

<option value="true">Shuffle</option>
</select>

<div id="question"></div>

<div id="result"></div>

</div>

<div class="nav-area">

<h3>Question Palette</h3>

<div id="summary"></div>

<div class="nav-grid" id="navPanel"></div>

</div>

</div>

}
